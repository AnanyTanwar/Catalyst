name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quick:
    name: Quick (native + test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y g++ make
      - name: Download NNUE
        run: make net
      - name: Build + test
        run: |
          make -j$(nproc) native
          echo "bench" | ./bin/catalyst-native

  linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86-64, sse41, avx2, bmi2, avx512, avx512vnni]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y g++ make
      - name: Download NNUE
        run: make net
      - name: Build
        run: make -j$(nproc) linux-${{ matrix.arch }}

  debug:
    name: Debug + ASan/UBSan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y g++ make
      - name: Download NNUE
        run: make net
      - name: Build + test
        run: |
          make -j$(nproc) sanitize
          echo "bench" | ./bin/catalyst-debug

  clang:
    name: Clang
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update -q && sudo apt-get install -y clang lld make
      - name: Download NNUE
        run: make net
      - name: Build + warnings as errors
        run: make -j$(nproc) native CXX=clang++ CXXFLAGS="$(make -s CXXFLAGS ARCH=native) -Werror"
